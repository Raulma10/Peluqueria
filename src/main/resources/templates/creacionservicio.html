<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Crear Servicio</title>
        <link rel="stylesheet" th:href="@{/estilos.css}"/>
    </head>
    <body>
        <nav>
            <ul>
                <li><a th:href="@{/usuarios/principal}">Inicio</a></li>
                <li><a href="#">Cita</a></li>
                <li><a href="#">Servicio</a></li>
                <li><a href="#">Nosotros</a></li>
                <li><a href="#">Contacto</a></li>
                <li class="usuario" sec:authorize="isAuthenticated()"><a th:href="@{/usuarios/logout}" >Cerrar Sesión</a></li>
                <li class="usuario" sec:authorize="isAuthenticated()"><span sec:authentication="name"></span></li>
            </ul>
        </nav>
        <h2>Formulario creacion de servicios</h2>
        
        <div>
            <form th:action="@{/servicios/crearservicio}" th:object="${servicio}" method="post">
                <label>Nombre:<br><input type="text" th:field="*{nombre}" class="input"/></label>
                <label>Precio:<br> <input type="number" th:field="*{precio}" step="0.01" class="input"/></label><br>
                <label><input type="submit" value="Añadir Servicio" class="boton"/></label>
            </form>
            <p th:if="${error}" th:text="${error}"></p>
        </div>
    </body>
</html>
