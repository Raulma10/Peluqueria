<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Crear Usuario</title>
        <link rel="stylesheet" th:href="@{/estilos.css}"/>
    </head>
    <body>
        

        <div>
            <form th:action="@{/usuarios/crearusuario}" th:object="${usuario}" method="post">
                <label>Nombre:<br> <input type="text" th:field="*{nombre}" /></label>
                <label>Apellido:<br> <input type="text" th:field="*{apellido}" /></label>
                <label>Email:<br> <input type="email" th:field="*{email}" /></label>
                <label>Contraseña:<br> <input type="password" th:field="*{password}" /></label><br>
                <label><input type="submit" value="Crear Usuario" class="boton"/></label>
            </form>
            <p th:if="${error}" th:text="${error}"></p>
        </div>
        

    </body>
</html>
